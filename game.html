<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Guess Game</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #051457, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-card {
            background: white;
            color: rgb(214, 13, 13);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background-color: #667eea;
            color: white;
        }

        .btn-custom:hover {
            background-color: #5a67d8;
        }
    </style>
</head>
<body>

<div class="game-card">
    <h3>🎯 Guess the Number</h3>
    <p>I picked a number between <b>1 and 10</b></p>

    <input type="number" id="guess" class="form-control mb-3" placeholder="Enter your guess">

    <button class="btn btn-custom w-100 mb-2" onclick="checkGuess()">Check</button>
    <button class="btn btn-secondary w-100" onclick="restartGame()">Restart</button>

    <p id="message" class="mt-3 fw-bold"></p>
    <p>Attempts: <span id="attempts">0</span></p>
</div>

<script>
    let randomNumber = Math.floor(Math.random() * 10) + 1;
    let attempts = 0;

    function checkGuess() {
        let guess = document.getElementById("guess").value;
        let message = document.getElementById("message");

        if (guess === "") {
            message.innerText = "⚠️ Please enter a number!";
            return;
        }

        guess = Number(guess);
        attempts++;
        document.getElementById("attempts").innerText = attempts;

        if (guess === randomNumber) {
            message.innerText = "🎉 Correct! You won!";
            message.style.color = "green";
        } else if (guess > randomNumber) {
            message.innerText = "📉 Too high! Try again.";
            message.style.color = "red";
        } else {
            message.innerText = "📈 Too low! Try again.";
            message.style.color = "blue";
        }
    }

    function restartGame() {
        randomNumber = Math.floor(Math.random() * 10) + 1;
        attempts = 0;
        document.getElementById("attempts").innerText = 0;
        document.getElementById("message").innerText = "";
        document.getElementById("guess").value = "";
    }
</script>

</body>
</html>
